<link rel="stylesheet" href="themes.css" />
<script>
  // Apply theme from URL ?theme=notebook|oscilloscope|editorial|clinical|cortex
  (function () {
    const t = new URLSearchParams(location.search).get("theme");
    if (t && ["notebook","oscilloscope","editorial","clinical"].includes(t)) {
      document.documentElement.dataset.theme = t;
      document.addEventListener("DOMContentLoaded", () => document.body.classList.add("theme-" + t));
    }
  })();
</script>
